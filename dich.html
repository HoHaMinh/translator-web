<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <title>Dịch Việt → Trung</title>
</head>
<body>

<h2>Dịch Việt → Trung (ChatGPT)</h2>

<textarea id="inputText" rows="4" cols="50" placeholder="Nhập tiếng Việt..."></textarea>
<br><br>

<button id="translateBtn">Dịch</button>

<p><b>Kết quả:</b></p>
<div id="translationResult">---</div>

<script>
document.getElementById("translateBtn").addEventListener("click", translate);

async function translate() {
    const text = document.getElementById("inputText").value;

    if (!text.trim()) {
        document.getElementById('translationResult').innerHTML = '⚠️ Nhập nội dung!';
        return;
    }

    const resultDiv = document.getElementById('translationResult');
    resultDiv.innerHTML = '⏳ Đang dịch ...';

    try {
        const response = await fetch("https://translate-api.lieunguyenhoa8893.workers.dev", {
            method: "POST",
            headers: {
                "Content-Type": "application/json"
            },
            body: JSON.stringify({ text })
        });

        const data = await response.json();
	if (data.error) {
    		resultDiv.innerHTML = "❌ Lỗi: " + JSON.stringify(data.error);
    		return;
	}

	resultDiv.innerHTML = data.translation || "❌ Không có kết quả";

    } catch (error) {
        resultDiv.innerHTML = "❌ Lỗi: " + error.message;
    }
}
</script>

</body>
</html>
