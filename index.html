<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dịch Thuật Thông Minh</title>
    <style>
        /* ĐỒNG NHẤT FONT CHỮ THEO Ý BẠN (Sử dụng font của ô nhập tay cho toàn bộ) */
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body { background-color: #F7F9FB; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }

        h2 { color: #0F3A5A; margin-bottom: 10px; font-weight: 600; font-size: 20px; text-transform: uppercase; text-align: center; }

        /* Ô nhập liệu */
        .input-wrapper { position: relative; background: white; border-radius: 12px; border: 1px solid #E0E0E0; }
        textarea { 
            width: 100%; height: 120px; padding: 15px; padding-right: 45px; 
            border: none; border-radius: 12px; font-size: 16px; line-height: 1.5; resize: none; outline: none;
        }

        /* NÚT THÙNG RÁC */
        .clear-btn { 
            position: absolute; top: 10px; right: 10px; background: none; border: none; 
            cursor: pointer; color: #999; padding: 5px; 
        }
        .clear-btn svg { width: 22px; height: 22px; fill: currentColor; }

        /* Nút Mic */
        .action-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { 
            border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; 
        }
        .btn-mic-vi { background: #E8F0FE; color: #1967D2; border: 1px solid #1A73E8; }
        .btn-mic-zh { background: #FFF4E5; color: #C26401; border: 1px solid #FFA000; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        .listening { background: #EA4335 !important; color: white !important; animation: pulse 1.5s infinite; }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* Nút Dịch */
        .btn-translate { 
            width: 100%; background-color: #3867D6; color: white; border: none; 
            padding: 16px 0; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; 
        }

        /* Kết quả */
        .result-wrapper { 
            position: relative; background: white; border-radius: 12px; border: 1px solid #E0E0E0; 
            padding: 15px; min-height: 80px; display: flex; justify-content: space-between; gap: 10px;
        }
        #translationResult { flex: 1; font-size: 17px; line-height: 1.6; color: #202124; }
        #copyBtn { border: none; background: none; color: #999; cursor: pointer; padding: 5px; }

        .status-msg { font-size: 12px; text-align: center; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Việt ⇄ Trung</h2>

        <div class="input-wrapper">
            <textarea id="inputText" placeholder="Nhập văn bản hoặc bấm Mic để nói..."></textarea>
            <button class="clear-btn" id="clearBtn" title="Xóa tất cả">
                <svg viewBox="0 0 24 24"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
            </button>
        </div>

        <div class="action-bars">
            <button class="btn btn-mic-vi" id="micViBtn">🎤 Nói Tiếng Việt</button>
            <button class="btn btn-mic-zh" id="micZhBtn">🎤 Nghe Tiếng Trung</button>
        </div>

        <button class="btn-translate" id="translateBtn">DỊCH NGAY</button>
        
        <div class="status-msg" id="statusMsg">Sẵn sàng</div>

        <div class="result-wrapper">
            <div id="translationResult">---</div>
            <button id="copyBtn">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
        </div>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const resultDiv = document.getElementById('translationResult');
        const statusMsg = document.getElementById('statusMsg');
        const API_URL = "https://translate-api.lieunguyenhoa8893.workers.dev";

        let activeSource = "VI";
        let activeTarget = "ZH";

        // 1. Nhận diện giọng nói (STT) - GIỮ NGUYÊN LOGIC CŨ
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;

        if (SpeechRecognition) {
            recognition = new SpeechRecognition();
            recognition.continuous = false;
            recognition.interimResults = false;

            recognition.onstart = () => { statusMsg.innerText = "🔴 Đang nghe..."; };
            recognition.onend = () => { 
                statusMsg.innerText = "Sẵn sàng";
                document.querySelectorAll('.btn').forEach(b => b.classList.remove('listening'));
            };
            recognition.onresult = (event) => {
                const transcript = event.results[0][0].transcript;
                inputText.value = transcript;
                translate(activeSource, activeTarget); // Tự động dịch sau khi nói
            };
        }

        function startListening(lang, btnId) {
            if (!recognition) return;
            recognition.lang = lang;
            document.getElementById(btnId).classList.add('listening');
            recognition.start();
        }

        // Gán sự kiện cho các nút Mic
        document.getElementById('micViBtn').onclick = () => {
            activeSource = "VI"; activeTarget = "ZH";
            startListening("vi-VN", 'micViBtn');
        };

        document.getElementById('micZhBtn').onclick = () => {
            activeSource = "ZH"; activeTarget = "VI";
            startListening("zh-CN", 'micZhBtn');
        };

        // 2. Hàm dịch 2 chiều
        async function translate(sLang, tLang) {
            const text = inputText.value.trim();
            if (!text) return;

            resultDiv.innerText = '⏳ Đang dịch...';
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ 
                        text: text,
                        source_lang: sLang,
                        target_lang: tLang
                    })
                });
                const data = await response.json();
                resultDiv.innerText = data.translation || "Lỗi kết quả";
            } catch (e) {
                resultDiv.innerText = "❌ Lỗi kết nối";
            }
        }

        document.getElementById('translateBtn').onclick = () => translate("VI", "ZH");

        // 3. Xóa tất cả (Thùng rác)
        document.getElementById('clearBtn').onclick = () => {
            inputText.value = '';
            resultDiv.innerText = '---';
            statusMsg.innerText = 'Đã xóa';
        };

        // 4. Copy
        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(resultDiv.innerText);
            statusMsg.innerText = "Đã copy!";
            setTimeout(() => statusMsg.innerText = "Sẵn sàng", 2000);
        };
    </script>
</body>
</html>
