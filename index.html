<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dịch thuật thông minh</title>
    <style>
        /* ĐỒNG NHẤT FONT CHỮ */
        * { 
            box-sizing: border-box; 
            margin: 0; 
            padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body { 
            background-color: #F4F7F9; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            padding: 20px; 
            min-height: 100vh;
        }

        .app-container { width: 100%; max-width: 480px; display: flex; flex-direction: column; gap: 15px; }

        h2 { 
            color: #2C5282; 
            text-align: center; 
            font-size: 18px; 
            margin-bottom: 10px; 
            text-transform: uppercase; 
            letter-spacing: 1px;
        }

        .input-group { position: relative; width: 100%; }
        
        textarea { 
            width: 100%; 
            height: 130px; 
            padding: 15px 45px 15px 15px; 
            border: 1px solid #E2E8F0; 
            border-radius: 16px; 
            font-size: 16px; 
            line-height: 1.5;
            resize: none; 
            outline: none;
            background: white;
        }

        /* NÚT THÙNG RÁC MỚI */
        .clean-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            cursor: pointer;
            color: #A0AEC0;
            padding: 5px;
        }
        /* Icon Thùng Rác SVG */
        .clean-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .action-row { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

        .btn-action {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            padding: 12px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 14px;
            cursor: pointer;
            border: 1px solid;
        }

        .btn-mic { background-color: #EBF4FF; color: #3182CE; border-color: #BEE3F8; }
        .btn-speaker { background-color: #FFFAF0; color: #DD6B20; border-color: #FEEBC8; }

        .btn-translate {
            width: 100%;
            background-color: #3182CE;
            color: white;
            border: none;
            padding: 15px;
            border-radius: 12px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
        }

        .status-text { text-align: center; font-size: 13px; color: #718096; margin: 5px 0; }

        .result-box {
            position: relative;
            background: white;
            border: 1px solid #E2E8F0;
            border-radius: 16px;
            padding: 15px 45px 15px 15px;
            min-height: 70px;
            font-size: 16px;
            color: #2D3748;
        }

        .copy-btn {
            position: absolute;
            top: 12px;
            right: 12px;
            background: none;
            border: none;
            color: #A0AEC0;
        }
        
        .toast {
            position: fixed; bottom: 30px; background: rgba(0,0,0,0.8);
            color: white; padding: 10px 20px; border-radius: 20px; font-size: 14px;
            display: none;
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Dịch thuật thông minh</h2>

        <div class="input-group">
            <textarea id="inputText" placeholder="Nhập tiếng Việt..."></textarea>
            <button class="clean-btn" onclick="clearAll()">
                <svg viewBox="0 0 24 24"><path d="M9,3V4H4V6H5V19A2,2 0 0,0 7,21H17A2,2 0 0,0 19,19V6H20V4H15V3H9M7,6H17V19H7V6M9,8V17H11V8H9M13,8V17H15V8H13Z"/></svg>
            </button>
        </div>

        <div class="action-row">
            <button class="btn-action btn-mic" onclick="startRecording()">🎤 Nói Tiếng Việt</button>
            <button class="btn-action btn-speaker" onclick="speakChinese()">🔊 Nghe Tiếng Trung</button>
        </div>

        <button class="btn-translate" id="translateBtn" onclick="translateText()">DỊCH NGAY</button>

        <div class="status-text" id="statusLabel">Sẵn sàng</div>

        <div class="result-box">
            <div id="translationResult">---</div>
            <button class="copy-btn" onclick="copyResult()">
                <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
        </div>
    </div>

    <div id="toast" class="toast">Đã sao chép!</div>

    <script>
        const resultDiv = document.getElementById('translationResult');
        const statusLabel = document.getElementById('statusLabel');
        const inputText = document.getElementById('inputText');

        function clearAll() {
            inputText.value = '';
            resultDiv.innerText = '---';
            statusLabel.innerText = 'Đã xóa';
        }

        function startRecording() {
            const Recognition = window.SpeechRecognition || window.webkitSpeechRecognition;
            if (!Recognition) {
                alert("Trình duyệt không hỗ trợ Mic.");
                return;
            }
            const recognition = new Recognition();
            recognition.lang = 'vi-VN';
            recognition.onstart = () => statusLabel.innerText = "🔴 Đang nghe...";
            recognition.onresult = (event) => {
                inputText.value = event.results[0][0].transcript;
                statusLabel.innerText = "Sẵn sàng";
            };
            recognition.start();
        }

        // SỬA LỖI PHÁT ÂM TIẾNG TRUNG
        function speakChinese() {
            const text = resultDiv.innerText;
            if (text === '---' || text === '') return;
            
            // Xóa mọi âm thanh đang phát dở
            window.speechSynthesis.cancel();

            const msg = new SpeechSynthesisUtterance(text);
            
            // Lấy danh sách voice có sẵn trên máy
            const voices = window.speechSynthesis.getVoices();
            
            // Tìm voice tiếng Trung (ưu tiên zh-CN)
            const chineseVoice = voices.find(v => v.lang.includes('zh-CN')) || 
                                 voices.find(v => v.lang.includes('zh')) ||
                                 voices.find(v => v.name.includes('Chinese'));

            if (chineseVoice) {
                msg.voice = chineseVoice;
            }
            
            msg.lang = 'zh-CN';
            msg.rate = 0.9; // Đọc chậm một chút cho dễ nghe
            
            window.speechSynthesis.speak(msg);
        }

        async function translateText() {
            const text = inputText.value.trim();
            if (!text) return;
            statusLabel.innerText = "⏳ Đang dịch...";
            try {
                const response = await fetch("https://translate-api.lieunguyenhoa8893.workers.dev", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text })
                });
                const data = await response.json();
                resultDiv.innerText = data.translation || "Không có kết quả";
                statusLabel.innerText = "Dịch xong!";
            } catch (e) {
                statusLabel.innerText = "Lỗi kết nối!";
            }
        }

        function copyResult() {
            const text = resultDiv.innerText;
            if (text === '---') return;
            navigator.clipboard.writeText(text);
            const toast = document.getElementById('toast');
            toast.style.display = 'block';
            setTimeout(() => toast.style.display = 'none', 2000);
        }

        // Kích hoạt nạp voice (cần thiết cho Chrome trên Android/iOS)
        window.speechSynthesis.getVoices();
    </script>
</body>
</html>
