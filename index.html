<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dịch thuật thông minh</title>
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        /* CSS resets và styles cơ bản */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Roboto', sans-serif; /* Phông chữ Roboto cho toàn bộ trang */
        }

        body {
            background-color: #f0f2f5; /* Màu nền nhẹ cho toàn trang */
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }

        .header {
            margin-bottom: 20px;
        }

        h1 {
            color: #3867d6; /* Màu xanh đậm cho tiêu đề */
            font-size: 20px;
            text-transform: uppercase;
        }

        .input-container {
            position: relative; /* Dùng position relative để định vị nút xóa bên trong */
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        textarea {
            width: 100%;
            height: 120px;
            padding: 15px;
            padding-right: 40px; /* Thêm padding bên phải để dành chỗ cho nút chổi quét */
            border: 1px solid #ccc;
            border-radius: 12px;
            background-color: #fff;
            resize: none;
            font-size: 16px;
        }

        /* Vấn đề 1: Style cho nút chổi quét mới */
        .clear-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .clear-btn svg {
            width: 20px;
            height: 20px;
            fill: #999; /* Màu icon */
        }

        .action-buttons {
            display: flex;
            gap: 10px;
            width: 100%;
            max-width: 400px;
            margin-bottom: 15px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border-radius: 20px;
            border: 1px solid;
            background-color: transparent;
            font-size: 14px;
            display: flex;
            align-items: center;
            justify-content: center;
            cursor: pointer;
        }

        .vi-btn {
            color: #3867d6;
            border-color: #3867d6;
        }

        .zh-btn {
            color: #e67e22;
            border-color: #e67e22;
        }

        .vi-btn svg {
            fill: #3867d6;
            margin-right: 5px;
        }

        .zh-btn svg {
            fill: #e67e22;
            margin-right: 5px;
        }

        .translate-btn {
            width: 100%;
            max-width: 400px;
            padding: 12px;
            background-color: #3867d6;
            color: #fff;
            border: none;
            border-radius: 12px;
            font-size: 16px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .status {
            font-size: 14px;
            color: #666;
            margin-bottom: 10px;
        }

        .result-container {
            width: 100%;
            max-width: 400px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 12px;
            background-color: #fff;
            position: relative;
        }

        .result-text {
            font-size: 16px;
            min-height: 50px;
        }

        .copy-btn {
            position: absolute;
            top: 15px;
            right: 15px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 0;
        }

        .copy-btn svg {
            width: 20px;
            height: 20px;
            fill: #999; /* Màu icon */
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>Dịch thuật thông minh</h1>
    </div>

    <div class="input-container">
        <textarea id="inputText" placeholder="Tôi muốn..."></textarea>
        <button class="clear-btn" id="clearBtn" title="Xóa nội dung">
            <svg viewBox="0 0 24 24"><path d="M19.36 2.828l-2.122 2.121a1.5 1.5 0 0 0-2.122 0l-10.6 10.607a1.5 1.5 0 0 0 0 2.121l2.12 2.122a1.5 1.5 0 0 0 2.122 0l10.606-10.606a1.5 1.5 0 0 0 0-2.122l-2.121-2.121a1.5 1.5 0 0 0-2.122 0zM17.117 7.182l1.06 1.061-8.485 8.485-1.06-1.061 8.485-8.485zm-4.243 4.243l1.06 1.06-2.121 2.122-1.06-1.06 2.121-2.122zM4.61 16.636l2.121 2.122-1.414 1.414-2.121-2.121 1.414-1.415z"/></svg>
        </button>
    </div>

    <div class="action-buttons">
        <button class="action-btn vi-btn">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2zm0 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm.5-12.5a.5.5 0 0 1 .5.5v2h2.5a.5.5 0 0 1 0 1H13v2.5a.5.5 0 0 1-1 0V11h-2.5a.5.5 0 0 1 0-1H12V8a.5.5 0 0 1 .5-.5z"/></svg>
            Nói Tiếng Việt
        </button>
        <button class="action-btn zh-btn">
            <svg viewBox="0 0 24 24" width="16" height="16"><path d="M12 2c5.523 0 10 4.477 10 10s-4.477 10-10 10S2 17.523 2 12 6.477 2 12 2zm0 18a8 8 0 1 0 0-16 8 8 0 0 0 0 16zm.5-12.5a.5.5 0 0 1 .5.5v2h2.5a.5.5 0 0 1 0 1H13v2.5a.5.5 0 0 1-1 0V11h-2.5a.5.5 0 0 1 0-1H12V8a.5.5 0 0 1 .5-.5z"/></svg>
            Nghe Tiếng Trung
        </button>
    </div>

    <button class="translate-btn" id="translateBtn">DỊCH NGAY</button>

    <div class="status" id="statusText">---</div>

    <div class="result-container">
        <div class="result-text" id="resultText">---</div>
        <button class="copy-btn" id="copyBtn" title="Sao chép kết quả">
            <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
    </div>

    <script>
        // JS để xử lý nút chổi quét xóa nội dung
        const inputText = document.getElementById('inputText');
        const clearBtn = document.getElementById('clearBtn');
        const translateBtn = document.getElementById('translateBtn');
        const statusText = document.getElementById('statusText');
        const resultText = document.getElementById('resultText');

        // Hàm xóa nội dung khi nhấn nút chổi quét
        clearBtn.addEventListener('click', function() {
            inputText.value = '';
            statusText.innerText = 'Đã xóa';
            resultText.innerText = '---';
        });

        // Mô phỏng chức năng dịch (để bạn thấy phông chữ đồng nhất)
        translateBtn.addEventListener('click', function() {
            if (inputText.value.trim() !== "") {
                statusText.innerText = 'Dịch thành công';
                resultText.innerText = 'Kết quả dịch sẽ có phông chữ đồng nhất ở đây...'; // Text kết quả có phông giống nhập liệu
            } else {
                statusText.innerText = '---';
                resultText.innerText = '---';
            }
        });
    </script>
</body>
</html>
