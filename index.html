<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Việt → Trung</title>
    <style>
        /* --- CSS Phong Cách Hiện Đại (Minimalist & Pro) --- */
        
        /* Reset CSS cơ bản */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        
        body { 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif, "Apple Color Emoji", "Segoe UI Emoji", "Segoe UI Symbol"; 
            background-color: #F7F9FB; /* Nền xám nhạt nhẹ nhàng */
            color: #333; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh; 
            padding: 20px; 
        }

        /* Container chính bao quanh app */
        .app-container { 
            width: 100%; 
            max-width: 500px; /* Giới hạn chiều rộng trên màn hình lớn */
            display: flex; 
            flex-direction: column; 
            gap: 15px; /* Khoảng cách giữa các phần tử */
            margin-top: 10px;
        }

        h2 { 
            color: #0F3A5A; /* Màu xanh đậm chuyên nghiệp của dịch thuật */
            margin-bottom: 20px; 
            font-weight: 600; 
            font-size: 20px; 
            text-transform: uppercase; 
            letter-spacing: 1px; 
            text-align: center;
        }

        /* Ô nhập liệu */
        textarea { 
            width: 100%; 
            height: 120px; 
            padding: 15px; 
            border: 1px solid #E0E0E0; 
            border-radius: 12px; /* Bo góc mềm mại */
            background-color: white; 
            font-size: 16px; /* Font size chuẩn di động để không bị phóng to tự động */
            line-height: 1.5; 
            resize: none; 
            transition: border-color 0.2s, box-shadow 0.2s; 
            outline: none; 
        }
        
        textarea:focus { 
            border-color: #3867D6; /* Màu viền khi focus */
            box-shadow: 0 0 0 3px rgba(56, 103, 214, 0.1); /* Hiệu ứng bóng đổ nhẹ */
        }

        /* Nút Dịch nổi bật */
        #translateBtn { 
            width: 100%; 
            background-color: #3867D6; 
            color: white; 
            border: none; 
            padding: 16px 0; 
            border-radius: 12px; 
            font-size: 16px; 
            font-weight: 600; 
            cursor: pointer; 
            transition: background-color 0.2s, transform 0.1s; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            gap: 8px; /* Khoảng cách icon và chữ */
            box-shadow: 0 4px 6px rgba(56, 103, 214, 0.2);
        }
        
        #translateBtn:active { 
            transform: translateY(1px); /* Hiệu ứng nhấn */
            background-color: #2D54B3; 
        }
        
        /* Hiệu ứng Đang dịch... */
        #translateBtn.loading { 
            background-color: #A0B3E0; 
            pointer-events: none; /* Khóa nút khi đang dịch */
        }
        
        /* Icon dịch (SVG) cho vào nút */
        #translateBtn svg { width: 18px; height: 18px; fill: currentColor; }

        /* Tiêu đề kết quả */
        .result-group-title { 
            font-weight: 600; 
            font-size: 14px; 
            color: #666; 
            margin-top: 10px; 
            margin-bottom: 5px; 
        }

        /* Khung chứa kết quả (Giống khung chat AI) */
        .result-wrapper { 
            position: relative; 
            width: 100%; 
            border-radius: 12px; 
            border: 1px solid #E0E0E0; 
            background-color: white; 
            padding: 15px; 
            min-height: 60px; 
            display: flex; 
            justify-content: space-between; 
            align-items: flex-start; 
            gap: 10px; 
        }
        
        /* Thay đổi màu nền khi có lỗi */
        .result-wrapper.error-container { 
            background-color: #F8D7DA; 
            border-color: #F5C6CB; 
        }

        /* Văn bản kết quả chính */
        #translationResult { 
            flex: 1; 
            overflow-wrap: break-word; 
            font-size: 16px; 
            line-height: 1.5; 
            color: #111;
        }

        /* Nút Copy nhanh (Giống nút trong khung chat OpenAI/ChatGPT) */
        #copyBtn { 
            border: none; 
            background: none; 
            color: #999; 
            cursor: pointer; 
            padding: 5px; 
            border-radius: 6px; 
            transition: color 0.2s, background-color 0.2s; 
            display: flex; 
            margin-top: -3px; /* Căn chỉnh vị trí */
        }
        
        #copyBtn:hover { 
            color: #555; 
            background-color: rgba(0,0,0,0.05); 
        }
        
        /* Icon copy (SVG) */
        #copyBtn svg { width: 20px; height: 20px; fill: currentColor; }

        /* Thông báo nhỏ khi copy thành công */
        .copy-tooltip { 
            position: fixed; 
            bottom: 20px; 
            left: 50%; 
            transform: translateX(-50%); 
            background-color: rgba(0,0,0,0.8); 
            color: white; 
            padding: 10px 20px; 
            border-radius: 8px; 
            font-size: 14px; 
            display: none; 
            z-index: 1000; 
            animation: fadeIn 0.3s; 
        }

        @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

        /* --- Tối ưu hóa cho di động cực nhỏ (ví dụ iPhone SE) --- */
        @media (max-width: 400px) {
            h2 { font-size: 18px; }
            textarea, #translateBtn, #translationResult { font-size: 15px; }
            #translateBtn { padding: 14px 0; }
        }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Việt → Trung</h2>

        <textarea id="inputText" rows="4" placeholder="Nhập văn bản tiếng Việt của bạn vào đây..."></textarea>

        <button id="translateBtn">
            <svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04M18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12m-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg>
            Dịch
        </button>

        <p class="result-group-title">Kết quả:</p>
        <div id="resultWrapper" class="result-wrapper">
            <div id="translationResult">---</div>
            <button id="copyBtn" title="Sao chép kết quả">
                <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
            </button>
        </div>
    </div>

    <div id="copyTooltip" class="copy-tooltip">Đã sao chép vào bộ nhớ tạm!</div>

<script>
    // --- JavaScript Nâng Cấp Tích Hợp Copy ---
    const translateBtn = document.getElementById("translateBtn");
    const inputText = document.getElementById("inputText");
    const resultDiv = document.getElementById('translationResult');
    const resultWrapper = document.getElementById('resultWrapper');
    const copyBtn = document.getElementById('copyBtn');
    const copyTooltip = document.getElementById('copyTooltip');

    translateBtn.addEventListener("click", translate);
    copyBtn.addEventListener("click", copyResult);

    async function translate() {
        const text = inputText.value;

        // Xử lý khi chưa nhập nội dung
        if (!text.trim()) {
            resultWrapper.classList.add('error-container');
            resultDiv.innerHTML = '⚠️ Hãy nhập nội dung trước!';
            return;
        }

        // --- UX: Đặt trạng thái Đang dịch... trên nút ---
        translateBtn.classList.add('loading');
        // Giữ lại icon dịch khi hiển thị chữ loading
        translateBtn.innerHTML = '⏳ Đang dịch ...';
        resultWrapper.classList.remove('error-container');
        resultDiv.innerHTML = '...';

        try {
            const response = await fetch("https://translate-api.lieunguyenhoa8893.workers.dev", {
                method: "POST",
                headers: {
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({ text })
            });

            const data = await response.json();

            // --- UX: Khôi phục trạng thái nút ---
            translateBtn.classList.remove('loading');
            // Đặt lại text của nút với icon ban đầu
            translateBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04M18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12m-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg> Dịch';

            if (data.error) {
                resultWrapper.classList.add('error-container');
                resultDiv.innerHTML = "❌ Lỗi hệ thống: " + JSON.stringify(data.error);
                return;
            }

            // Hiển thị kết quả dịch
            resultDiv.innerHTML = data.translation || "❌ Không có kết quả";

        } catch (error) {
            // Khôi phục trạng thái nút ngay cả khi lỗi
            translateBtn.classList.remove('loading');
            translateBtn.innerHTML = '<svg viewBox="0 0 24 24"><path d="M12.87 15.07l-2.54-2.51.03-.03c1.74-1.94 2.98-4.17 3.71-6.53H17V4h-7V2H8v2H1v2h11.17C11.5 7.92 10.44 9.75 9 11.35 8.07 10.32 7.3 9.19 6.69 8h-2c.73 1.63 1.73 3.17 2.98 4.56l-5.09 5.02L4 19l5-5 3.11 3.11.76-2.04M18.5 10h-2L12 22h2l1.12-3h4.75L21 22h2l-4.5-12m-2.62 7l1.62-4.33L19.12 17h-3.24z"/></svg> Dịch';
            
            resultWrapper.classList.add('error-container');
            resultDiv.innerHTML = "❌ Lỗi kết nối: " + error.message;
        }
    }

    // --- Tính năng Copy nhanh mới ---
    async function copyResult() {
        const resultText = resultDiv.innerText;
        // Kiểm tra xem có kết quả dịch hợp lệ không
        if (resultText === "---" || resultText === "..." || resultText.includes('⚠️') || resultText.includes('❌')) return;

        try {
            await navigator.clipboard.writeText(resultText);
            
            // --- UX: Hiển thị tooltip thành công ---
            copyTooltip.style.display = 'block';
            setTimeout(() => {
                copyTooltip.style.display = 'none';
            }, 2000); // Ẩn sau 2 giây
            
        } catch (err) {
            console.error('Không thể sao chép văn bản: ', err);
            // Bạn có thể hiển thị một thông báo lỗi khác ở đây nếu muốn
        }
    }
</script>

</body>
</html>
