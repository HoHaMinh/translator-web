<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dịch Thuật Thông Minh</title>
    <style>
        * { 
            box-sizing: border-box; margin: 0; padding: 0; 
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
        }
        
        body { background-color: #F7F9FB; display: flex; flex-direction: column; align-items: center; padding: 20px; min-height: 100vh; }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 15px; }

        h2 { color: #0F3A5A; margin-bottom: 10px; font-weight: 600; font-size: 20px; text-transform: uppercase; text-align: center; }

        .input-wrapper { position: relative; background: white; border-radius: 12px; border: 1px solid #E0E0E0; }
        textarea { 
            width: 100%; height: 120px; padding: 15px; padding-right: 45px; 
            border: none; border-radius: 12px; font-size: 16px; line-height: 1.5; resize: none; outline: none;
        }

        .clear-btn { 
            position: absolute; top: 10px; right: 10px; background: none; border: none; 
            cursor: pointer; color: #999; padding: 5px; 
        }
        .clear-btn svg { width: 22px; height: 22px; fill: currentColor; }

        .action-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        .btn { 
            border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; 
            cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; 
        }
        .btn-mic-vi { background: #E8F0FE; color: #1967D2; border: 1px solid #1A73E8; }
        .btn-mic-zh { background: #FFF4E5; color: #C26401; border: 1px solid #FFA000; }
        
        .listening { 
            background: #EA4335 !important; 
            color: white !important; 
            border-color: #EA4335 !important;
            animation: pulse 1.5s infinite; 
        }
        
        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.7; } 100% { opacity: 1; } }

        .btn-translate { 
            width: 100%; background-color: #3867D6; color: white; border: none; 
            padding: 16px 0; border-radius: 12px; font-size: 16px; font-weight: 600; cursor: pointer; 
        }

        /* Khung kết quả có thêm khu vực chứa nút chức năng */
        .result-wrapper { 
            position: relative; background: white; border-radius: 12px; border: 1px solid #E0E0E0; 
            padding: 15px; min-height: 80px; display: flex; flex-direction: column; gap: 10px;
        }
        #translationResult { font-size: 17px; line-height: 1.6; color: #202124; width: 100%; word-break: break-word;}
        
        .result-tools { 
            display: flex; justify-content: flex-end; gap: 15px; border-top: 1px solid #F0F0F0; padding-top: 10px;
        }
        .tool-btn { border: none; background: none; color: #999; cursor: pointer; display: flex; align-items: center; gap: 5px; font-size: 12px; }
        .tool-btn:active { color: #3867D6; }
        .tool-btn svg { width: 20px; height: 20px; fill: currentColor; }

        .status-msg { font-size: 12px; text-align: center; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

    <div class="app-container">
        <h2>Việt ⇄ Trung</h2>

        <div class="input-wrapper">
            <textarea id="inputText" placeholder="Nhập văn bản hoặc bấm Mic để nói..."></textarea>
            <button class="clear-btn" id="clearBtn">
                <svg viewBox="0 0 24 24"><path d="M19,4H15.5L14.5,3H9.5L8.5,4H5V6H19V4M6,19A2,2 0 0,0 8,21H16A2,2 0 0,0 18,19V7H6V19Z"/></svg>
            </button>
        </div>

        <div class="action-bars">
            <button class="btn btn-mic-vi" id="micViBtn"><span>🎤 Nói Tiếng Việt</span></button>
            <button class="btn btn-mic-zh" id="micZhBtn"><span>🎤 Nghe Tiếng Trung</span></button>
        </div>

        <button class="btn-translate" id="translateBtn">DỊCH NGAY</button>
        
        <div class="status-msg" id="statusMsg">Sẵn sàng</div>

        <div class="result-wrapper">
            <div id="translationResult">---</div>
            <div class="result-tools">
                <button class="tool-btn" id="speakBtn" title="Đọc kết quả">
                    <svg viewBox="0 0 24 24"><path d="M14,3.23V5.29C16.89,6.15 19,8.83 19,12C19,15.17 16.89,17.85 14,18.71V20.77C18,19.86 21,16.28 21,12C21,7.72 18,4.14 14,3.23M16.5,12C16.5,10.23 15.5,8.71 14,7.97V16.02C15.5,15.29 16.5,13.77 16.5,12M3,9V15H7L12,20V4L7,9H3Z"/></svg>
                </button>
                <button class="tool-btn" id="copyBtn" title="Sao chép">
                    <svg viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
                </button>
            </div>
        </div>
    </div>

    <script>
        const inputText = document.getElementById('inputText');
        const resultDiv = document.getElementById('translationResult');
        const statusMsg = document.getElementById('statusMsg');
        const micViBtn = document.getElementById('micViBtn');
        const micZhBtn = document.getElementById('micZhBtn');
        const speakBtn = document.getElementById('speakBtn');
        const API_URL = "https://translate-api.lieunguyenhoa8893.workers.dev";

        let activeSource = "VI";
        let activeTarget = "ZH";
        let isListening = false;

        // 1. Cấu hình Nhận diện giọng nói (STT)
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        let recognition;
        if (SpeechRecognition) {
            recognition = new Recognition();
            recognition.interimResults = true;
            recognition.onstart = () => { isListening = true; statusMsg.innerText = "🔴 Đang nghe... Bấm lại để dừng"; };
            recognition.onend = () => { isListening = false; statusMsg.innerText = "Sẵn sàng"; resetMicButtons(); };
            recognition.onresult = (event) => {
                inputText.value = event.results[0][0].transcript;
                if (event.results[0].isFinal) translate(activeSource, activeTarget);
            };
        }

        function resetMicButtons() {
            micViBtn.classList.remove('listening'); micZhBtn.classList.remove('listening');
            micViBtn.querySelector('span').innerText = "🎤 Nói Tiếng Việt";
            micZhBtn.querySelector('span').innerText = "🎤 Nghe Tiếng Trung";
        }

        function toggleMic(lang, btn) {
            if (isListening) { recognition.stop(); } 
            else {
                activeSource = (lang === 'vi-VN') ? "VI" : "ZH";
                activeTarget = (lang === 'vi-VN') ? "ZH" : "VI";
                recognition.lang = lang;
                btn.classList.add('listening');
                btn.querySelector('span').innerText = "🛑 Bấm để Dừng";
                recognition.start();
            }
        }

        micViBtn.onclick = () => toggleMic("vi-VN", micViBtn);
        micZhBtn.onclick = () => toggleMic("zh-CN", micZhBtn);

        // 2. Hàm dịch
        async function translate(sLang, tLang) {
            const text = inputText.value.trim();
            if (!text) return;
            resultDiv.innerText = '⏳ Đang dịch...';
            try {
                const response = await fetch(API_URL, {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({ text, source_lang: sLang, target_lang: tLang })
                });
                const data = await response.json();
                resultDiv.innerText = data.translation || "Lỗi kết quả";
            } catch (e) { resultDiv.innerText = "❌ Lỗi kết nối"; }
        }

        document.getElementById('translateBtn').onclick = () => {
            activeTarget = "ZH"; // Mặc định nút dịch to là dịch sang Trung
            translate("VI", "ZH");
        };

        // 3. TÍNH NĂNG LOA ĐỌC (Text-to-Speech)
        speakBtn.onclick = () => {
            const text = resultDiv.innerText;
            if (text === '---' || text === '⏳ Đang dịch...') return;

            window.speechSynthesis.cancel(); // Dừng các âm thanh cũ
            const utterance = new SpeechSynthesisUtterance(text);
            
            // Tự động chọn giọng dựa trên activeTarget
            if (activeTarget === "ZH") {
                utterance.lang = 'zh-CN';
            } else {
                utterance.lang = 'vi-VN';
            }
            
            utterance.rate = 0.9; // Tốc độ hơi chậm cho dễ nghe
            window.speechSynthesis.speak(utterance);
        };

        // 4. Các tính năng phụ
        document.getElementById('clearBtn').onclick = () => { inputText.value = ''; resultDiv.innerText = '---'; };
        document.getElementById('copyBtn').onclick = () => {
            navigator.clipboard.writeText(resultDiv.innerText);
            statusMsg.innerText = "Đã copy!";
            setTimeout(() => statusMsg.innerText = "Sẵn sàng", 2000);
        };
    </script>
</body>
</html>
