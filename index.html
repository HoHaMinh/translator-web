<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>AI Translator Pro</title>
    <style>
        /* --- Kế thừa style cũ và thêm mới --- */
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, sans-serif; background-color: #F0F2F5; padding: 15px; display: flex; flex-direction: column; align-items: center; }
        .app-container { width: 100%; max-width: 500px; display: flex; flex-direction: column; gap: 12px; }
        
        h2 { color: #1A73E8; font-size: 18px; text-align: center; margin: 10px 0; }

        /* Khung nhập liệu có nút xóa */
        .input-wrapper { position: relative; background: white; border-radius: 16px; border: 1px solid #ddd; padding: 10px; }
        textarea { width: 100%; height: 100px; border: none; outline: none; font-size: 16px; resize: none; padding-top: 10px; }
        
        .clear-btn { position: absolute; top: 10px; right: 10px; background: #eee; border: none; border-radius: 50%; width: 28px; height: 28px; cursor: pointer; color: #666; display: flex; align-items: center; justify-content: center; }

        /* Khu vực nút bấm */
        .action-bars { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn { border: none; border-radius: 12px; padding: 12px; font-size: 14px; font-weight: 600; cursor: pointer; display: flex; align-items: center; justify-content: center; gap: 8px; transition: 0.2s; }
        
        .btn-translate { grid-column: span 2; background: #1A73E8; color: white; font-size: 16px; margin-top: 5px; }
        .btn-mic-vi { background: #E8F0FE; color: #1967D2; border: 1px solid #1A73E8; }
        .btn-mic-zh { background: #FFF4E5; color: #C26401; border: 1px solid #FFA000; }
        .btn:active { opacity: 0.7; transform: scale(0.98); }
        .listening { background: #EA4335 !important; color: white !important; animation: pulse 1.5s infinite; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.6; } 100% { opacity: 1; } }

        /* Kết quả */
        .result-wrapper { background: white; border-radius: 16px; border: 1px solid #ddd; padding: 15px; min-height: 80px; position: relative; }
        #translationResult { font-size: 17px; line-height: 1.6; color: #202124; margin-right: 30px; }
        #copyBtn { position: absolute; top: 10px; right: 10px; background: none; border: none; color: #999; cursor: pointer; }

        .status-msg { font-size: 12px; text-align: center; color: #666; margin-top: 5px; }
    </style>
</head>
<body>

<div class="app-container">
    <h2>DỊCH THUẬT THÔNG MINH</h2>

    <div class="input-wrapper">
        <textarea id="inputText" placeholder="Nhập văn bản hoặc bấm Mic để nói..."></textarea>
        <button class="clear-btn" id="clearBtn">✕</button>
    </div>

    <div class="action-bars">
        <button class="btn btn-mic-vi" id="micViBtn">🎤 Nói Tiếng Việt</button>
        <button class="btn btn-mic-zh" id="micZhBtn">🎤 Nghe Tiếng Trung</button>
        <button class="btn btn-translate" id="translateBtn">DỊCH NGAY</button>
    </div>

    <div class="status-msg" id="statusMsg">Sẵn sàng</div>

    <div class="result-wrapper">
        <div id="translationResult">---</div>
        <button id="copyBtn">
            <svg width="20" height="20" fill="currentColor" viewBox="0 0 24 24"><path d="M16 1H4c-1.1 0-2 .9-2 2v14h2V3h12V1zm3 4H8c-1.1 0-2 .9-2 2v14c0 1.1.9 2 2 2h11c1.1 0 2-.9 2-2V7c0-1.1-.9-2-2-2zm0 16H8V7h11v14z"/></svg>
        </button>
    </div>
</div>

<script>
    const API_URL = "https://translate-api.lieunguyenhoa8893.workers.dev";
    const inputText = document.getElementById('inputText');
    const resultDiv = document.getElementById('translationResult');
    const statusMsg = document.getElementById('statusMsg');

    // 1. Tính năng Xóa tất cả
    document.getElementById('clearBtn').addEventListener('click', () => {
        inputText.value = '';
        resultDiv.innerText = '---';
        statusMsg.innerText = 'Đã xóa';
    });

    // 2. Tính năng Nhận diện Giọng nói (STT)
    const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
    let recognition;

    if (SpeechRecognition) {
        recognition = new SpeechRecognition();
        recognition.continuous = false;
        recognition.interimResults = false;

        recognition.onstart = () => { statusMsg.innerText = "🔴 Đang nghe..."; };
        recognition.onend = () => { 
            statusMsg.innerText = "Sẵn sàng";
            document.querySelectorAll('.btn').forEach(b => b.classList.remove('listening'));
        };
        
        recognition.onresult = (event) => {
            const transcript = event.results[0][0].transcript;
            inputText.value = transcript;
            // Tự động dịch sau khi nói xong
            translate(activeSource, activeTarget);
        };
    } else {
        alert("Trình duyệt này không hỗ trợ giọng nói. Hãy dùng Chrome/Safari.");
    }

    let activeSource = "VI";
    let activeTarget = "ZH";

    document.getElementById('micViBtn').onclick = () => {
        activeSource = "VI"; activeTarget = "ZH";
        startListening("vi-VN", 'micViBtn');
    };

    document.getElementById('micZhBtn').onclick = () => {
        activeSource = "ZH"; activeTarget = "VI";
        startListening("zh-CN", 'micZhBtn');
    };

    function startListening(lang, btnId) {
        if (!recognition) return;
        recognition.lang = lang;
        document.getElementById(btnId).classList.add('listening');
        recognition.start();
    }

    // 3. Hàm Dịch (Đã nâng cấp dịch 2 chiều)
    document.getElementById('translateBtn').onclick = () => translate("VI", "ZH");

    async function translate(sLang, tLang) {
        const text = inputText.value.trim();
        if (!text) return;

        resultDiv.innerText = '⏳ Đang dịch...';
        
        try {
            const response = await fetch(API_URL, {
                method: "POST",
                headers: { "Content-Type": "application/json" },
                body: JSON.stringify({ text, source_lang: sLang, target_lang: tLang })
            });
            const data = await response.json();
            resultDiv.innerText = data.translation || "Lỗi kết quả";
        } catch (e) {
            resultDiv.innerText = "❌ Lỗi: " + e.message;
        }
    }

    // Copy kết quả
    document.getElementById('copyBtn').onclick = () => {
        navigator.clipboard.writeText(resultDiv.innerText);
        statusMsg.innerText = "Đã copy!";
        setTimeout(() => statusMsg.innerText = "Sẵn sàng", 2000);
    };
</script>

</body>
</html>
